<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASA - Picture of the day</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="progress" id="progress">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <header class="header">
      <div class="left">
        <p class="header-nasa">NASA</p>
        <h1>Astronomy Picture of the Day</h1>
      </div>

      <div class="right">
        <label for="date-picker" class="date-label">Pick a date</label>
        <div class="date-row">
          <input type="date" id="date-picker" />
          <button class="btn-today" id="btn-today" title="Go to today">
            Today
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      
      <!-- Loading state -->
      <div class="state" id="state-loading">
        <div class="spinner"></div>
        <p class="state-text" id="loading-text">
          Loading image from deep space...
        </p>
        <p class="state-subtext" id="loading-subtext"></p>
      </div>

      <!-- Error state -->
      <div class="state hidden" id="state-error">
        <div class="error-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="#cc3333" stroke-width="1.5"/>
            <path d="M24 15v13M24 33v2"
              stroke="#cc3333"
              stroke-width="2.5"
              stroke-linecap="round"/>
          </svg>
        </div>

        <p class="error-title" id="error-title">Error loading image</p>
        <p class="error-msg" id="error-msg"></p>

        <div class="error-actions">
          <button class="btn-retry" id="btn-retry">Try Again</button>
          <button class="btn-today-err" id="btn-today-err">
            Go to today
          </button>
        </div>
      </div>

      <!-- Results state -->
      <div class="state hidden" id="state-results">
        <div id="media-area"></div>

        <div class="info-panel">
          <div class="info-top">
            <div class="info-text">
              <h2 id="apod-title"></h2>
              <p class="apod-date" id="apod-date"></p>
            </div>

            <div class="info-actions">
              <p class="apod-credit" id="apod-credit"></p>
              <button class="btn-share" id="btn-share">
                Share
              </button>
            </div>
          </div>

          <p class="apod-desc" id="apod-desc"></p>
        </div>
      </div>

    </main>

    <section class="gallery">
      <div class="gallery header">
        <p class="gallery-label">Last 7 days</p>
        <p class="gallery-hint">Click any thumbnail to load that day</p>
      </div>

      <div class="gallery-strip" id="gallery-strip"></div>
    </section>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
