<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Counter</title>
    <script src="counter.js" defer></script>
    <link rel="stylesheet" href="counter.css" />
  </head>
  <body>
    <div class="counter">
      <p id="display">0</p>
      <div class="btn-row">
        <button id="decrement">-</button>
        <button id="increment">+</button>
        <button id="reset">Reset</button>
      </div>
    </div>
  </body>
</html>
