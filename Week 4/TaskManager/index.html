<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div>
          <h1>Tasks</h1>
          <p class="header-sub" id="task-count">No tasks yet</p>
        </div>
      </header>

      <!-- Input -->
      <div class="input-section">
        <div class="input-row">
          <input
            type="text"
            id="task-input"
            placeholder="Add a new task..."
            autocomplete="off"
            maxlength="200"
          />
          <button id="add-btn">Add</button>
        </div>

        <!-- Validation message -->
        <p class="input-error" id="input-error"></p>
      </div>

    <!-- Search and filter -->
     <div class="controls">
 
      <!-- Search input -->
      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          id="search-input"
          placeholder="Search tasks..."
          autocomplete="off"
        />
        <button class="search-clear hidden" id="search-clear" aria-label="Clear search">×</button>
      </div>
 
      <!-- Filter tabs: All / Active / Completed -->
      <div class="filter-group" id="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
 

      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect
              x="10"
              y="8"
              width="28"
              height="34"
              rx="3"
              stroke="var(--border-mid)"
              stroke-width="1.5"
            />
            <path
              d="M17 18h14M17 24h14M17 30h8"
              stroke="var(--border-mid)"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <p class="empty-title" id="empty-title">No tasks yet</p>
        <p class="empty-sub" id="empty-sub">Add your first task above to get started</p>
      </div>

      <!-- Task list -->
      <ul class="task-list" id="task-list"></ul>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
