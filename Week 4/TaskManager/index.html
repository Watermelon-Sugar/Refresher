<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div>
          <h1>Tasks</h1>
          <p class="header-sub" id="task-count">No tasks yet</p>
        </div>
      </header>

      <!-- Input -->
      <div class="input-section">
        <div class="input-row">
          <input
            type="text"
            id="task-input"
            placeholder="Add a new task..."
            autocomplete="off"
            maxlength="200"
          />
          <button id="add-btn">Add</button>
        </div>

        <!-- Validation message -->
        <p class="input-error" id="input-error"></p>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect
              x="10"
              y="8"
              width="28"
              height="34"
              rx="3"
              stroke="var(--border-mid)"
              stroke-width="1.5"
            />
            <path
              d="M17 18h14M17 24h14M17 30h8"
              stroke="var(--border-mid)"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <p class="epty-title">No tasks yet</p>
        <p class="empty-sub">Add your first task above to get started</p>
      </div>

      <!-- Task list -->
      <ul class="task-list" id="task-list"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
